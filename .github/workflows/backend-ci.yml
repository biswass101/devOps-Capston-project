name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bmi-health-backend

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: bmi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U appuser -d bmi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 3000
      NODE_ENV: test
      FRONTEND_URL: http://localhost:5173
      DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/bmi_test
      SKIP_DB_CHECK: false
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: |
          psql "$DATABASE_URL" -f migrations/001_create_measurements.sql
          psql "$DATABASE_URL" -f migrations/002_add_measurement_date.sql
          psql "$DATABASE_URL" -f migrations/003_seed_measurements.sql

      - name: Lint backend
        run: npm run lint

      - name: Run backend unit tests
        run: npm run test:unit

      - name: Run backend integration tests
        env:
          SKIP_DB_CHECK: true
        run: npm run test:integration

      - name: Build backend container for validation
        run: docker build -t bmi-health-backend:ci .

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
