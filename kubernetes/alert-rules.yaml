apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: finch-alerts
  namespace: finch
spec:
  groups:
    - name: finch.rules
      rules:
        - alert: BackendUnavailable
          expr: kube_deployment_status_replicas_available{namespace="finch",deployment="backend"} < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Backend deployment has no available replicas
        - alert: BackendHighRestartCount
          expr: increase(kube_pod_container_status_restarts_total{namespace="finch",container="backend"}[15m]) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Backend pod is restarting frequently
        - alert: HighBackendCPU
          expr: avg(rate(container_cpu_usage_seconds_total{namespace="finch",container="backend"}[5m])) > 0.8
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Backend CPU usage is high
        - alert: PostgreSQLExporterDown
          expr: up{namespace="finch",service="postgresql-exporter"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: PostgreSQL exporter is unreachable
        - alert: RedisExporterDown
          expr: up{namespace="finch",service="redis-exporter"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Redis exporter is unreachable
