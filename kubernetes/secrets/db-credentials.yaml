apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: finch
type: Opaque
stringData:
  POSTGRES_DB: replace-with-db-name
  POSTGRES_USER: replace-with-db-user
  POSTGRES_PASSWORD: replace-with-db-password
  DATABASE_URL: postgresql://replace-with-db-user:replace-with-db-password@postgresql.finch.svc.cluster.local:5432/replace-with-db-name
