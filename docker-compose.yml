version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bmidb
      POSTGRES_USER: bmi_user
      POSTGRES_PASSWORD: strongpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bmi_user -d bmidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finch-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:8080
      DATABASE_URL: postgresql://bmi_user:strongpassword@postgres:5432/bmidb
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: finch-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
